<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Configuration pour mobile-first -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>LightHer · Signaler</title>

    <!-- Import de la charte graphique globale -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <style>
        /* Styles spécifiques pour centrer le contenu et adapter au thème */
        .page-signalement {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 120px;
            min-height: 100dvh;
        }

        .header-signalement {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-signalement h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            font-weight: 300;
            color: white;
        }
        
        .header-signalement h1 span { color: var(--pink); }

        .chrono-box {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chrono-box span {
            font-weight: bold;
            color: var(--pink-light);
        }

        .form-container { width: 100%; max-width: 400px; }

        .score-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .slider-group { margin-bottom: 20px; }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }
        .slider-group label span { color: var(--pink-light); font-weight: bold; }

        /* Style des sliders pour matcher avec le thème de Sélène */
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--bg-input);
            border-radius: 10px;
            outline: none;
            -webkit-appearance: none;
            margin-top: 10px;
            border: 1px solid var(--border);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--pink);
            cursor: pointer;
            box-shadow: 0 0 10px var(--pink-glow);
        }

        #message-succes {
            display: none;
            color: var(--vert);
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            background: rgba(34, 197, 94, 0.1);
            padding: 10px;
            border-radius: var(--radius-card);
            border: 1px solid var(--vert);
        }

        /* Étoiles en arrière-plan */
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .star {
            position: absolute; border-radius: 50%; background: var(--pink-light);
            animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
        }
        @keyframes twinkle {
            0%,100% { opacity:.04; transform:scale(1); }
            50% { opacity:.40; transform:scale(1.4); }
        }
    </style>
</head>
<body>

    <!-- Animation du fond étoilé -->
    <div class="stars" id="stars" aria-hidden="true"></div>

    <!-- Snippet de protection de Binta : redirige si non connecté -->
    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        onAuthStateChanged(auth, user => {
            if (!user) window.location.href = 'auth.html';
        });
    </script>

    <main class="page-signalement">
        
        <header class="header-signalement">
            <h1>Light<span>HER</span></h1>
            <!-- Chronomètre depuis l'ouverture de la page -->
            <div class="chrono-box">
                Objectif -30s | Temps : <span id="chrono">0</span>s
            </div>
        </header>

        <div class="carte-info form-container">
            
            <div class="score-display">
                <span style="font-size: 0.9rem; font-weight: 500;">Score calculé :</span>
                <!-- Badge coloré en temps réel -->
                <span id="badge-score" class="badge-gris">En attente</span>
            </div>

            <!-- 4 Sliders HTML de 0 à 10 -->
            <div class="slider-group">
                <label for="eclairage">Éclairage (35%) <span id="val-eclairage">5/10</span></label>
                <input type="range" id="eclairage" min="0" max="10" value="5">
            </div>
            
            <div class="slider-group">
                <label for="affluence">Affluence (25%) <span id="val-affluence">5/10</span></label>
                <input type="range" id="affluence" min="0" max="10" value="5">
            </div>
            
            <div class="slider-group">
                <label for="incidents">Absence d'incidents (30%) <span id="val-incidents">5/10</span></label>
                <input type="range" id="incidents" min="0" max="10" value="5">
            </div>
            
            <div class="slider-group">
                <label for="sentiment">Sentiment (10%) <span id="val-sentiment">5/10</span></label>
                <input type="range" id="sentiment" min="0" max="10" value="5">
            </div>

            <!-- Bouton d'envoi -->
            <button id="btn-envoyer" class="btn-principal" style="margin-top: 10px;">
                Envoyer le signalement
            </button>
            
            <!-- Message de confirmation masqué par défaut -->
            <div id="message-succes">Signalement envoyé ! Merci</div>
        </div>

    </main>

    <!-- Barre de navigation fixée en bas -->
    <nav>
        <a href="index.html">Carte</a>
        <a href="signalement.html" style="background: var(--pink-light); color: var(--bg-deep);">Signaler</a>
        <a href="itineraire.html">Itinéraire</a>
        <a href="sos.html">SOS</a>
        <a href="auth.html">Profil</a>
    </nav>

    <!-- Script principal -->
    <script type="module">
        // Import des dépendances du projet
        import { db } from './firebase-config.js';
        import { calculerSS, getCouleur } from './score.js';
        import { addDoc, collection } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        // 1. Génération des étoiles
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 1;
            s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
            starsEl.appendChild(s);
        }

        // 2. Gestion du Chronomètre
        let secondes = 0;
        const spanChrono = document.getElementById('chrono');
        const intervalChrono = setInterval(() => {
            secondes++;
            spanChrono.textContent = secondes;
            if (secondes > 30) spanChrono.style.color = "var(--rouge)"; // Alerte si > 30s
        }, 1000);

        // 3. Calcul du Score SS en temps réel
        const ids = ['eclairage', 'affluence', 'incidents', 'sentiment'];
        const badgeScore = document.getElementById('badge-score');

        function mettreAJourScore() {
            // Récupération des valeurs
            const e = parseInt(document.getElementById('eclairage').value);
            const a = parseInt(document.getElementById('affluence').value);
            const i = parseInt(document.getElementById('incidents').value);
            const s = parseInt(document.getElementById('sentiment').value);

            // Mise à jour de l'affichage texte
            document.getElementById('val-eclairage').textContent = e + '/10';
            document.getElementById('val-affluence').textContent = a + '/10';
            document.getElementById('val-incidents').textContent = i + '/10';
            document.getElementById('val-sentiment').textContent = s + '/10';

            // Calcul via score.js
            const ss = calculerSS(e, a, i, s);
            const infoCouleur = getCouleur(ss);

            // Mise à jour visuelle du badge
            badgeScore.textContent = ss + '/10 - ' + infoCouleur.label;
            badgeScore.style.backgroundColor = infoCouleur.couleur;
            badgeScore.style.color = "#ffffff";
        }

        // Écouteurs d'événements sur les sliders
        ids.forEach(id => {
            document.getElementById(id).addEventListener('input', mettreAJourScore);
        });

        // Initialisation au chargement
        mettreAJourScore();

        // 4. Envoi vers Firebase Firestore
        document.getElementById('btn-envoyer').addEventListener('click', () => {
            const btn = document.getElementById('btn-envoyer');
            btn.disabled = true;

            // Récupération GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const e = parseInt(document.getElementById('eclairage').value);
                    const a = parseInt(document.getElementById('affluence').value);
                    const i = parseInt(document.getElementById('incidents').value);
                    const s = parseInt(document.getElementById('sentiment').value);
                    const ss = calculerSS(e, a, i, s);

                    try {
                        // Sauvegarde dans la collection 'signalements'
                        await addDoc(collection(db, 'signalements'), {
                            eclairage: e,
                            affluence: a,
                            incidents: i,
                            sentiment: s,
                            ss: ss,
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            timestamp: new Date()
                        });

                        // Succès : arrêt du chrono et affichage du message
                        clearInterval(intervalChrono);
                        btn.style.display = 'none';
                        document.getElementById('message-succes').style.display = 'block';

                        // Redirection vers index.html après 2 secondes
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);

                    } catch (error) {
                        console.error("Erreur Firebase : ", error);
                        alert("Erreur réseau. Impossible d'envoyer le signalement.");
                        btn.disabled = false;
                    }
                }, (error) => {
                    alert("Tu dois autoriser l'accès à ta position pour signaler un lieu.");
                    btn.disabled = false;
                });
            } else {
                alert("Ton navigateur ne gère pas la géolocalisation.");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
