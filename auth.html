<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>LightHer · Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #D946EF;
      --pink-light:  #F0ABFC;
      --pink-dark:   #86198F;
      --pink-glow:   rgba(217, 70, 239, 0.22);
      --bg-deep:     #0D0518;
      --bg-card:     #160B2E;
      --bg-input:    #1E1040;
      --text-primary:#F5E9FF;
      --text-muted:  #A78BBD;
      --text-ph:     #6B4F85;
      --error-color: #F2726A;
      --error-bg:    rgba(242,114,106,0.10);
      --border:      rgba(217,70,239,0.18);
      --radius-card: 24px;
      --radius-input:14px;
      --radius-btn:  14px;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-deep);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      /* reset body constraints from style.css for this page */
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(140,20,180,0.30) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 15% 85%,  rgba(217,70,239,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: var(--pink-light);
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity:.04; transform:scale(1); }
      50%      { opacity:.40; transform:scale(1.4); }
    }

    /* Page */
    .auth-page {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 20px 44px;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeDown .6s ease both;
    }

    .brand-logo {
      width: 72px; height: 72px;
      margin: 0 auto 12px;
      filter: drop-shadow(0 0 20px rgba(217,70,239,.55));
    }

    .brand-name {
      font-family: 'Fraunces', serif;
      font-size: 2rem; font-weight: 300;
      letter-spacing: .04em; color: var(--text-primary);
      line-height: 1;
    }
    .brand-name span { color: var(--pink); }

    .brand-tagline {
      margin-top: 6px;
      font-size: .75rem; font-weight: 300;
      color: var(--text-muted);
      letter-spacing: .14em; text-transform: uppercase;
    }

    /* Card */
    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(217,70,239,.06),
        0 24px 60px rgba(0,0,0,.55),
        0 0 50px rgba(140,20,180,.08);
      animation: fadeUp .6s ease .1s both;
    }

    /* Tabs */
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      appearance: none; background: none; border: none;
      padding: 18px 0 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer; position: relative;
      transition: color .25s;
      letter-spacing: .02em;
    }
    .tab-btn::after {
      content: '';
      position: absolute; bottom: -1px; left: 20%; width: 60%; height: 2px;
      background: var(--pink); border-radius: 2px;
      transform: scaleX(0);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .tab-btn.active { color: var(--pink-light); }
    .tab-btn.active::after { transform: scaleX(1); }

    /* Panels */
    .forms-wrapper { position: relative; overflow: hidden; }
    .form-panel { padding: 28px 24px 24px; display: none; animation: fadeIn .3s ease both; }
    .form-panel.active { display: block; }

    /* Labels */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .72rem; font-weight: 500;
      color: var(--text-muted);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Inputs */
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-ph); pointer-events: none; transition: color .2s;
    }
    .field input[type="email"],
    .field input[type="password"] {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-input);
      padding: 14px 14px 14px 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; color: var(--text-primary);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
      /* reset style.css */
      margin: 0; box-sizing: border-box;
    }
    .field input::placeholder { color: var(--text-ph); }
    .field input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-glow);
    }
    .field input.error-field {
      border-color: var(--error-color);
      box-shadow: 0 0 0 3px rgba(242,114,106,.12);
    }

    /* Toggle PW */
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-ph);
      cursor: pointer; padding: 2px; line-height: 0; transition: color .2s;
    }
    .toggle-pw:hover { color: var(--pink); }

    /* Checkbox */
    .checkbox-field {
      display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 20px; cursor: pointer;
    }
    .checkbox-field input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      flex-shrink: 0; width: 20px; height: 20px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 6px; margin-top: 2px; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      /* reset style.css */
      padding: 0;
    }
    .checkbox-field input[type="checkbox"]::after {
      content: ''; position: absolute; inset: 3px;
      border-radius: 3px; background: var(--pink);
      transform: scale(0);
      transition: transform .2s cubic-bezier(.34,1.56,.64,1);
    }
    .checkbox-field input[type="checkbox"]:checked {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-glow);
    }
    .checkbox-field input[type="checkbox"]:checked::after { transform: scale(1); }
    .checkbox-field .checkbox-label { font-size: .85rem; color: var(--text-muted); line-height: 1.5; }
    .checkbox-field .checkbox-label strong { color: var(--pink-light); font-weight: 500; }

    /* Error */
    .error-msg {
      display: none;
      background: var(--error-bg);
      border: 1px solid rgba(242,114,106,.25);
      border-radius: 10px; padding: 12px 14px;
      font-size: .82rem; color: var(--error-color);
      margin-bottom: 16px; line-height: 1.5;
      animation: shake .35s ease;
    }
    .error-msg.visible { display: flex; align-items: flex-start; gap: 8px; }
    .error-msg svg { flex-shrink: 0; margin-top: 1px; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--pink);
      border: none; border-radius: var(--radius-btn);
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 500;
      color: #1a003d; cursor: pointer;
      letter-spacing: .03em;
      transition: background .2s, transform .15s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      overflow: hidden; position: relative;
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--pink-light);
      box-shadow: 0 6px 24px rgba(217,70,239,.40);
    }
    .btn-submit:active:not(:disabled) { transform: scale(.98); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(26,0,61,.3);
      border-top-color: #1a003d; border-radius: 50%;
      display: none; animation: spin .7s linear infinite;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner  { display: block; }

    /* Footer link */
    .form-footer {
      text-align: center; margin-top: 20px;
      font-size: .78rem; color: var(--text-muted);
    }
    .link-switch {
      background: none; border: none;
      color: var(--pink); font-family: 'DM Sans', sans-serif;
      font-size: .78rem; cursor: pointer; padding: 0;
      text-decoration: underline; text-underline-offset: 3px;
    }

    /* Animations */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }
  </style>
</head>
<body>

  <div class="stars" id="stars" aria-hidden="true"></div>

  <main class="auth-page">

    <!-- Brand -->
    <div class="brand">
      <img class="brand-logo" src="../img/LightHER.png" alt="LightHER logo" height = '900'/>
      <h1 class="brand-name">Light<span>HER</span></h1>
      <p class="brand-tagline">Ta sécurité, la nuit</p>
    </div>

    <!-- Auth card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" data-target="login">Se connecter</button>
        <button class="tab-btn" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register" data-target="register">S'inscrire</button>
      </div>

      <div class="forms-wrapper">

        <!-- LOGIN -->
        <div class="form-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">

          <div class="error-msg" id="login-error" role="alert" aria-live="assertive">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13A6.5 6.5 0 0 0 8 1.5zM7.25 4.75a.75.75 0 0 1 1.5 0v3.5a.75.75 0 0 1-1.5 0v-3.5zm.75 7a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z" fill="currentColor"/></svg>
            <span id="login-error-text"></span>
          </div>

          <div class="field">
            <label for="login-email">Adresse e-mail</label>
            <div class="input-wrap">
              <input type="email" id="login-email" placeholder="toi@exemple.com" autocomplete="email" inputmode="email" />
              <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M2.25 4.5h13.5a.75.75 0 0 1 .75.75v8.25a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1-.75-.75V5.25a.75.75 0 0 1 .75-.75z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="m1.5 5.25 7.5 5.25 7.5-5.25" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <div class="field">
            <label for="login-password">Mot de passe</label>
            <div class="input-wrap">
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
              <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <rect x="3" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M6 8V5.5a3 3 0 0 1 6 0V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <button type="button" class="toggle-pw" aria-label="Afficher le mot de passe" data-target="login-password">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M1 9s2.8-5.5 8-5.5S17 9 17 9s-2.8 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>

          <button class="btn-submit" id="btn-login" type="button">
            <span class="btn-text">Se connecter</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>

          <div class="form-footer">
            Pas encore de compte ?
            <button type="button" class="link-switch" data-switch="register">S'inscrire</button>
          </div>
        </div>

        <!-- REGISTER -->
        <div class="form-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">

          <div class="error-msg" id="register-error" role="alert" aria-live="assertive">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13A6.5 6.5 0 0 0 8 1.5zM7.25 4.75a.75.75 0 0 1 1.5 0v3.5a.75.75 0 0 1-1.5 0v-3.5zm.75 7a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z" fill="currentColor"/></svg>
            <span id="register-error-text"></span>
          </div>

          <div class="field">
            <label for="register-email">Adresse e-mail</label>
            <div class="input-wrap">
              <input type="email" id="register-email" placeholder="toi@exemple.com" autocomplete="email" inputmode="email" />
              <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M2.25 4.5h13.5a.75.75 0 0 1 .75.75v8.25a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1-.75-.75V5.25a.75.75 0 0 1 .75-.75z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="m1.5 5.25 7.5 5.25 7.5-5.25" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <div class="field">
            <label for="register-password">Mot de passe</label>
            <div class="input-wrap">
              <input type="password" id="register-password" placeholder="Minimum 6 caractères" autocomplete="new-password" />
              <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <rect x="3" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M6 8V5.5a3 3 0 0 1 6 0V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <button type="button" class="toggle-pw" aria-label="Afficher le mot de passe" data-target="register-password">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M1 9s2.8-5.5 8-5.5S17 9 17 9s-2.8 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="register-confirm">Confirmer le mot de passe</label>
            <div class="input-wrap">
              <input type="password" id="register-confirm" placeholder="Répète ton mot de passe" autocomplete="new-password" />
              <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <rect x="3" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M6 8V5.5a3 3 0 0 1 6 0V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <button type="button" class="toggle-pw" aria-label="Afficher le mot de passe" data-target="register-confirm">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M1 9s2.8-5.5 8-5.5S17 9 17 9s-2.8 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>

          <label class="checkbox-field">
            <input type="checkbox" id="certify-checkbox" />
            <span class="checkbox-label">
              Je certifie être une <strong>femme</strong> et accepte que LightHER est un espace réservé aux femmes.
            </span>
          </label>

          <button class="btn-submit" id="btn-register" type="button">
            <span class="btn-text">Créer mon compte</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>

          <div class="form-footer">
            Déjà inscrite ?
            <button type="button" class="link-switch" data-switch="login">Se connecter</button>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script type="module">
    import { auth } from './firebase-config.js';
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    /* Stars */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 1;
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
      starsEl.appendChild(s);
    }

    /* Tabs */
    function switchTab(t) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        const a = b.dataset.target === t;
        b.classList.toggle('active', a);
        b.setAttribute('aria-selected', String(a));
      });
      document.querySelectorAll('.form-panel').forEach(p =>
        p.classList.toggle('active', p.id === `panel-${t}`)
      );
      clearErrors();
    }
    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.target)));
    document.querySelectorAll('.link-switch').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.switch)));

    /* Password toggle */
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    });

    /* Errors */
    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('visible'));
      document.querySelectorAll('.error-field').forEach(e => e.classList.remove('error-field'));
    }
    function showError(id, msg, fields = []) {
      const box = document.getElementById(`${id}-error`);
      document.getElementById(`${id}-error-text`).textContent = msg;
      box.classList.add('visible');
      fields.forEach(f => document.getElementById(f)?.classList.add('error-field'));
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function firebaseFR(code) {
      return ({
        'auth/invalid-email':         "L'adresse e-mail n'est pas valide.",
        'auth/user-not-found':        "Aucun compte associé à cette adresse.",
        'auth/wrong-password':        "Mot de passe incorrect.",
        'auth/invalid-credential':    "E-mail ou mot de passe incorrect.",
        'auth/email-already-in-use':  "Cette adresse e-mail est déjà utilisée.",
        'auth/weak-password':         "Le mot de passe est trop court (6 caractères minimum).",
        'auth/too-many-requests':     "Trop de tentatives. Réessaie dans quelques minutes.",
        'auth/network-request-failed':"Problème de connexion réseau.",
        'auth/user-disabled':         "Ce compte a été désactivé.",
      })[code] || "Une erreur inattendue s'est produite.";
    }

    /* Loading */
    function setLoading(btn, v) { btn.disabled = v; btn.classList.toggle('loading', v); }

    /* Login */
    document.getElementById('btn-login').addEventListener('click', async () => {
      clearErrors();
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-password').value;
      if (!email) return showError('login', "Merci de saisir ton adresse e-mail.", ['login-email']);
      if (!pw)    return showError('login', "Merci de saisir ton mot de passe.", ['login-password']);
      const btn = document.getElementById('btn-login');
      setLoading(btn, true);
      try {
        await signInWithEmailAndPassword(auth, email, pw);
        window.location.href = 'index.html';
      } catch(e) { showError('login', firebaseFR(e.code), ['login-email','login-password']); setLoading(btn, false); }
    });

    /* Register */
    document.getElementById('btn-register').addEventListener('click', async () => {
      clearErrors();
      const email   = document.getElementById('register-email').value.trim();
      const pw      = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const certify = document.getElementById('certify-checkbox').checked;
      if (!email)        return showError('register', "Merci de saisir ton adresse e-mail.", ['register-email']);
      if (!pw)           return showError('register', "Merci de choisir un mot de passe.", ['register-password']);
      if (pw.length < 6) return showError('register', "Le mot de passe doit contenir au moins 6 caractères.", ['register-password']);
      if (pw !== confirm) return showError('register', "Les mots de passe ne correspondent pas.", ['register-password','register-confirm']);
      if (!certify)      return showError('register', "Tu dois certifier être une femme pour rejoindre LightHER.");
      const btn = document.getElementById('btn-register');
      setLoading(btn, true);
      try {
        await createUserWithEmailAndPassword(auth, email, pw);
        window.location.href = 'index.html';
      } catch(e) { showError('register', firebaseFR(e.code), ['register-email']); setLoading(btn, false); }
    });

    /* Enter key */
    document.getElementById('panel-login').querySelectorAll('input').forEach(i =>
      i.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-login').click(); })
    );
    document.getElementById('panel-register').querySelectorAll('input').forEach(i =>
      i.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-register').click(); })
    );
  </script>
</body>
